<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stmem 时间记忆平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .header { background: #151613; padding: 16px 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
    .header h1 { font-size: 20px; color: #B3FF38; }
    .header span { color: #666; font-size: 13px; margin-left: 8px; }
    .container { max-width: 900px; margin: 24px auto; padding: 0 16px; }
    .upload-box { border: 2px dashed #444; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; background: #222; }
    .upload-box:hover { border-color: #B3FF38; background: #2a2a2a; }
    .upload-box p { color: #aaa; margin-bottom: 8px; font-size: 15px; }
    .upload-box small { color: #555; font-size: 12px; }
    #fileInput { display: none; }
    .preview { margin-top: 16px; display: none; text-align: center; }
    .preview img { max-width: 100%; max-height: 400px; border-radius: 8px; }
    .status { text-align: center; padding: 12px; color: #B3FF38; font-size: 14px; display: none; }
    .status.err { color: #ff6b6b; }
    .result { margin-top: 16px; background: #222; border-radius: 8px; padding: 20px; display: none; border-left: 3px solid #B3FF38; }
    .result h3 { color: #B3FF38; font-size: 14px; margin-bottom: 10px; }
    .result p { color: #ddd; line-height: 1.7; font-size: 14px; }
    .result .meta { color: #666; font-size: 12px; margin-top: 12px; padding-top: 8px; border-top: 1px solid #333; }
    .frames { margin-top: 32px; }
    .frames h2 { color: #B3FF38; font-size: 16px; margin-bottom: 16px; }
    .frame-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .frame-card { background: #222; border-radius: 8px; overflow: hidden; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
    .frame-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(179,255,56,0.15); }
    .frame-card img { width: 100%; height: 120px; object-fit: cover; }
    .frame-card .desc { padding: 8px; font-size: 11px; color: #999; line-height: 1.4; max-height: 55px; overflow: hidden; }
    .frame-card .time { padding: 0 8px 8px; font-size: 10px; color: #555; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Stmem</h1>
    <span>时间记忆平台</span>
  </div>
  <div class="container">
    <div class="upload-box" id="uploadBox">
      <p>点击或拖拽上传照片</p>
      <small>调用 LinuxC MiniCPM-V-4.6 进行语义识别</small>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <div class="status" id="status"></div>
    <div class="preview" id="preview"><img id="previewImg"></div>
    <div class="result" id="result">
      <h3>语义识别结果</h3>
      <p id="resultText"></p>
      <div class="meta" id="resultMeta"></div>
    </div>
    <div class="frames">
      <h2>已有记忆</h2>
      <div class="frame-list" id="frameList"></div>
    </div>
  </div>
  <script>
    const STMEM = location.origin;
    const LINUXC_API = 'http://192.168.0.100:11000';
    const MODEL = 'MiniCPM-V-4_6-Q4_K_M.gguf';
    const PROMPT = '请描述这张图片的具体内容，重点关注：人物（人数、外貌特征、穿着、具体动作）、物品（型号、颜色、位置）、场景变化（与空旷状态的不同之处）。忽略不变的背景描述，只描述画面中有特征的元素。如果画面为空场景，仅回复"空场景，无人无特殊物品"。';

    const uploadBox = document.getElementById('uploadBox');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');
    const result = document.getElementById('result');
    const resultText = document.getElementById('resultText');
    const resultMeta = document.getElementById('resultMeta');
    const status = document.getElementById('status');
    const frameList = document.getElementById('frameList');

    uploadBox.addEventListener('click', () => fileInput.click());
    uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.style.borderColor = '#B3FF38'; });
    uploadBox.addEventListener('dragleave', () => { uploadBox.style.borderColor = '#444'; });
    uploadBox.addEventListener('drop', e => { e.preventDefault(); uploadBox.style.borderColor = '#444'; if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]); });
    fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

    function setStatus(msg, err) {
      status.textContent = msg;
      status.className = err ? 'status err' : 'status';
      status.style.display = 'block';
    }

    async function fileToBase64(file) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(file);
      });
    }

    async function handleFile(file) {
      previewImg.src = URL.createObjectURL(file);
      preview.style.display = 'block';
      result.style.display = 'none';
      setStatus('正在上传到 LinuxC 并调用 MiniCPM-V-4.6 识别...');

      try {
        const base64 = await fileToBase64(file);
        const t0 = Date.now();
        const resp = await fetch(LINUXC_API + '/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: MODEL,
            messages: [{ role: 'user', content: [
              { type: 'image_url', image_url: { url: 'data:image/jpeg;base64,' + base64 } },
              { type: 'text', text: PROMPT }
            ]}],
            max_tokens: 1024,
            temperature: 0.1
          })
        });
        const data = await resp.json();
        const elapsed = Date.now() - t0;
        const desc = data.choices?.[0]?.message?.content || '无识别结果';

        resultText.textContent = desc;
        resultMeta.textContent = `模型: ${MODEL} | 耗时: ${elapsed}ms | Token: ${data.usage?.total_tokens || '未知'}`;
        result.style.display = 'block';
        setStatus('识别完成！正在同步到 stmem 记忆库...');

        // 同步到 stmem frames 目录
        const formData = new FormData();
        formData.append('frame', file);
        await fetch(STMEM + '/api/capture', { method: 'POST', body: formData });

        setStatus('完成！');
        setTimeout(loadFrames, 1000);

      } catch (err) {
        setStatus('识别失败: ' + err.message, true);
      }
    }

    function loadFrames() {
      fetch(STMEM + '/api/frames')
        .then(r => r.json())
        .then(frames => {
          frameList.innerHTML = '';
          const list = Array.isArray(frames) ? frames : (frames.frames || []);
          list.forEach(fr => {
            const mem = fr.memory || {};
            const card = document.createElement('div');
            card.className = 'frame-card';
            const desc = mem.description || '';
            card.innerHTML = '<img src="' + (fr.thumbnail || '') + '" loading="lazy"><div class="desc">' + desc.slice(0, 80) + (desc.length > 80 ? '...' : '') + '</div><div class="time">' + (mem.captureTime ? new Date(mem.captureTime).toLocaleString('zh-CN') : '') + '</div>';
            card.addEventListener('click', () => {
              resultText.textContent = desc || '无描述';
              resultMeta.textContent = '模型: ' + (mem.model || '未知') + ' | 耗时: ' + (mem.inferenceTime ? mem.inferenceTime + 'ms' : '未知') + ' | 时间: ' + (mem.captureTime ? new Date(mem.captureTime).toLocaleString('zh-CN') : '');
              result.style.display = 'block';
              result.scrollIntoView({ behavior: 'smooth' });
            });
            frameList.appendChild(card);
          });
        })
        .catch(err => setStatus('加载失败: ' + err.message, true));
    }

    loadFrames();
  </script>
</body>
</html>
